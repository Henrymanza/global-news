# render.yaml — Render.com Blueprint
# Defines BOTH services in one file.
# Connect your GitHub repo to Render and it will auto-deploy everything.
#
# Docs: https://render.com/docs/blueprint-spec

services:

  # ──────────────────────────────────────────────────────────────
  # 1. BACKEND — Express API (Web Service)
  #    URL: https://geointel-api.onrender.com
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: geointel-api
    runtime: node
    plan: free                   # Free tier (spins down after 15min idle)
    region: oregon               # us-west-2 — change to: frankfurt, singapore, ohio
    branch: main
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health

    envVars:
      # ── Server config ─────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000             # Render assigns this automatically; keep for reference

      # ── CORS — set to your static site URL after first deploy ─
      - key: CORS_ORIGIN
        value: https://geointel-frontend.onrender.com

      # ── AI ────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false              # You'll paste this in the Render dashboard

      # ── Email alerts ──────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── SMS alerts ────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ──────────────────────────────────────────────────────────────
  # 2. FRONTEND — Vite React App (Static Site)
  #    URL: https://geointel-frontend.onrender.com
  # ──────────────────────────────────────────────────────────────
  - type: static
    name: geointel-frontend
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false

    # Redirect all routes to index.html (SPA routing)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # ── Backend URL (point to the API service above) ──────────
      - key: VITE_API_URL
        value: https://geointel-api.onrender.com

      # ── News & Market data (public keys — safe in frontend) ───
      - key: VITE_NEWSAPI_KEY
        sync: false
      - key: VITE_ALPHAVANTAGE_KEY
        sync: false
      - key: VITE_POLYGON_KEY
        sync: false

      # ── Firebase (public config — safe in frontend) ───────────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
